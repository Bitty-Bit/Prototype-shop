{% extends "store/base.html" %}

{% block title %}Log in — Shop{% endblock %}

{% block content %}
<div class="auth-card">
    <h1 class="page-title">Log in</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <input type="hidden" name="next" value="{{ next }}">
        <button type="submit" class="btn-primary">Log in</button>
    </form>
    <p class="auth-alt">No account yet? <a href="{% url 'signup' %}">Sign up</a></p>
</div>
{% endblock %}
