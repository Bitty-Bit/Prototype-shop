{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Shop{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'store/style.css' %}">
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <a href="{% url 'product_list' %}" class="logo">SHOP<span>.</span></a>
            <nav class="nav">
                <a href="{% url 'product_list' %}">Products</a>
               
                {% if user.is_authenticated %}

                 <a href="{% url 'cart_detail' %}" class="cart-link">
                    Cart
                    <span class="cart-count" id="cart-count" {% if not cart_count %}style="display:none"{% endif %}>{{ cart_count }}</span>
                </a>
                
                    <a href="{% url 'account' %}">My account</a>
                    <form method="post" action="{% url 'logout' %}" class="logout-form">
                        {% csrf_token %}
                        <button type="submit" class="logout-btn">Log out</button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}">Log in</a>
                {% endif %}
            </nav>
        </div>
    </header>

    <main class="container main">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>&copy; 2026 Shop. Built with Django.</p>
        </div>
    </footer>
    <script src="{% static 'store/cart.js' %}"></script>
</body>
</html>
